<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brunei Address Parser</title>
  <style>
    body {
      font-family: monospace;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #111;
    }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    p.subtitle { font-size: 0.8rem; color: #666; margin-top: 0; margin-bottom: 20px; }
    textarea {
      width: 100%;
      height: 100px;
      font-family: monospace;
      font-size: 0.95rem;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #aaa;
      resize: vertical;
    }
    button {
      margin-top: 8px;
      padding: 7px 20px;
      font-family: monospace;
      font-size: 0.95rem;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #333; }
    button#clearBtn {
      background: #fff;
      color: #111;
      border: 1px solid #aaa;
      margin-left: 8px;
    }
    button#clearBtn:hover { background: #f0f0f0; }
    #output {
      margin-top: 24px;
      display: none;
    }
    #output h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 6px 10px;
      border: 1px solid #ddd;
    }
    th { background: #f4f4f4; width: 35%; }
    td { word-break: break-word; }
    td.empty { color: #bbb; font-style: italic; }
    td.enriched { color: #555; font-style: italic; }
    #debugSection { margin-top: 16px; }
    #debugToggle {
      font-size: 0.78rem;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: underline;
    }
    #debugLog {
      display: none;
      margin-top: 8px;
      padding: 10px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      font-size: 0.75rem;
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 250px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

<h1>Brunei Address Parser</h1>
<p class="subtitle">Extracts structured fields from messy Brunei address strings. <em>Italicised values</em> were filled from postcode mapping.</p>

<textarea id="inputAddress" placeholder="Enter address here"></textarea>
<br>
<button id="parseBtn" onclick="runParser()">Parse</button>
<button id="clearBtn" onclick="clearAll()">Clear</button>

<div id="output">
  <h2>Parsed Result</h2>
  <table id="resultTable">
    <tr><th>House Number</th><td id="r_house"></td></tr>
    <tr><th>Simpang</th><td id="r_spg"></td></tr>
    <tr><th>Jalan</th><td id="r_jln"></td></tr>
    <tr><th>Kampong</th><td id="r_kg"></td></tr>
    <tr><th>Mukim</th><td id="r_mukim"></td></tr>
    <tr><th>Postcode</th><td id="r_postcode"></td></tr>
    <tr><th>District</th><td id="r_district"></td></tr>
    <tr><th>Country</th><td id="r_country"></td></tr>
  </table>

  <div id="debugSection">
    <button id="debugToggle" onclick="toggleDebug()">▶ Show debug log</button>
    <div id="debugLog"></div>
  </div>
</div>

PELUMPONG","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT3528","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"KAMPONG PELUMPONG","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT3128","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"KAMPONG PENGALAYAN","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT3328","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"KAMPONG PULAU MUARA BESAR","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT2128","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"KAMPONG SABUN","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT1728","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"KAMPONG SERASA","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT1528","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"KAMPONG TANJONG BATU","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BT1128","DISTRICT":"BRUNEI MUARA","MUKIM":"SERASA","KAMPONG":"PEKAN MUARA","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK1125","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG BOLKIAH 'A'","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK1325","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG BOLKIAH 'B'","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK1525","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG SETIA 'A'","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK1725","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG SETIA 'B'","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK2325","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG SUNGAI KEBUN","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK1925","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG SUNGAI SIAMAS","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BK2125","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEBUN","KAMPONG":"KAMPONG UJONG KELINIK","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BN1311","DISTRICT":"BRUNEI MUARA","MUKIM":"SUNGAI KEDAYAN","KAMPONG":"KAMPONG BUKIT SALAT","COUNTRY":"BRUNEI DARUSSALAM"},{"POSTCODE":"BN21 // ============================================================
// PARSER CORE — Modify with care.
// ============================================================

/**
 * Street/place prefixes used by both the District and Country snipers
 * to avoid stealing words that are part of a street name.
 * e.g. "Jalan Tutong" should not have "Tutong" sniped as a district.
 * e.g. "Jalan Malaysia" should not have "Malaysia" sniped as a country.
 */
const STREET_PREFIXES = [
  "JALAN", "JLN", "SIMPANG", "SPG", "KAMPONG", "KAMPUNG", "KG", "KPG",
];

function parseAddress(raw) {
  const log = [];

  // enrichedFields tracks which fields were filled from the postcode map
  // so the UI can style them differently.
  const enrichedFields = new Set();

  const result = {
    houseNumber : "",
    simpang     : "",
    jalan       : "",
    kampong     : "",
    mukim       : "",
    postcode    : "",
    district    : "",
    country     : "",
  };

  // ----------------------------------------------------------------
  // Phase 1: Normalise
  // ----------------------------------------------------------------
  let s = raw;
  // Handle literal \n and \r typed as text — must run BEFORE toUpperCase
  // because toUpperCase() would turn \n into \N, breaking the match.
  s = s.replace(/\\n/g, " ").replace(/\\r/g, " ");
  s = s.toUpperCase();
  // Handle real line breaks from pasted multiline text
  s = s.replace(/[\r\n]+/g, " ");
  s = s.replace(/,/g, " ");
  s = s.replace(/\./g, " ");
  s = s.replace(/\s+/g, " ").trim();
  log.push("Phase 1 — After normalisation: " + s);

  // ----------------------------------------------------------------
  // Phase 2a: Postcode Sniper
  // ----------------------------------------------------------------
  const postcodeMatch = s.match(/\b[A-Z]{2}\d{4}\b/);
  if (postcodeMatch) {
    result.postcode = postcodeMatch[0];
    s = s.replace(postcodeMatch[0], " ").replace(/\s+/g, " ").trim();
    log.push("Phase 2a — Postcode found: " + result.postcode + " | Remaining: " + s);
  } else {
    log.push("Phase 2a — No postcode found.");
  }

  // ----------------------------------------------------------------
  // Phase 2b: District Sniper
  // Guard: skip if the district name is immediately preceded by a
  // street marker — prevents "Jalan Tutong" losing "Tutong".
  // ----------------------------------------------------------------
  for (const district of DISTRICTS) {
    const idx = s.indexOf(district);
    if (idx === -1) continue;

    const before = s.slice(0, idx).trim().split(" ");
    const precedingWord = before[before.length - 1] || "";

    if (STREET_PREFIXES.includes(precedingWord)) {
      log.push("Phase 2b — District snipe BLOCKED for [" + district + "] — preceded by: " + precedingWord);
      continue;
    }

    result.district = district;
    s = s.replace(district, " ").replace(/\s+/g, " ").trim();
    log.push("Phase 2b — District found: " + result.district + " | Remaining: " + s);
    break;
  }

  if (!result.district) log.push("Phase 2b — No district found.");

  // ----------------------------------------------------------------
  // Phase 2c: Country Sniper
  // Does NOT break on first match — scans all entries and the last
  // match wins. This handles "MALAYSIA BRUNEI" → outputs "BRUNEI".
  // Same street-prefix guard as the district sniper.
  // ----------------------------------------------------------------
  for (const country of COUNTRIES) {
    const idx = s.indexOf(country);
    if (idx === -1) continue;

    const before = s.slice(0, idx).trim().split(" ");
    const precedingWord = before[before.length - 1] || "";

    if (STREET_PREFIXES.includes(precedingWord)) {
      log.push("Phase 2c — Country snipe BLOCKED for [" + country + "] — preceded by: " + precedingWord);
      continue;
    }

    // Overwrite — last match in list wins
    result.country = country;
    s = s.replace(country, " ").replace(/\s+/g, " ").trim();
    log.push("Phase 2c — Country sniped: " + country + " | Remaining: " + s);
  }

  if (!result.country) {
    log.push("Phase 2c — No country found.");
  } else {
    log.push("Phase 2c — Final country: " + result.country);
  }

  // ----------------------------------------------------------------
  // Phase 2d: Attached Numbers Fix
  // Splits letter-digit boundaries: SPG123 → SPG 123
  // ----------------------------------------------------------------
  s = s.replace(/([A-Z])(\d)/g, "$1 $2");
  s = s.replace(/(\d)([A-Z])/g, "$1 $2");
  s = s.replace(/\s+/g, " ").trim();
  log.push("Phase 2d — After attached-numbers fix: " + s);

  // ----------------------------------------------------------------
  // Phase 3: Whitelist Protection
  // Replace known compound names with placeholder tokens so the
  // state machine treats them as single opaque words.
  // ----------------------------------------------------------------
  const whitelistRestore = {};
  let wlIndex = 0;
  for (const entry of WHITELIST) {
    if (s.includes(entry)) {
      const token = "WLTOKEN" + wlIndex;
      whitelistRestore[token] = entry;
      s = s.replace(new RegExp(entry, "g"), token);
      log.push("Phase 3 — Whitelist protected: [" + entry + "] → " + token);
      wlIndex++;
    }
  }
  s = s.replace(/\s+/g, " ").trim();

  // ----------------------------------------------------------------
  // Phase 4: Alias Mapping
  // Each word is checked against ALIAS_MAP.
  // House markers encode the original word: MARKER_HOUSE:ORIGINALWORD
  // Other markers are plain tokens.
  // ----------------------------------------------------------------
  let words = s.split(" ");
  words = words.map(w => ALIAS_MAP[w] || w);
  log.push("Phase 4 — After alias mapping: " + words.join(" "));

  // ----------------------------------------------------------------
  // Phase 5: State Machine
  // Reads one word at a time, switching the active bucket on markers.
  // House markers append the original marker word to the bucket,
  // preserving user intent (NOMBOR, UNIT, BLOCK, etc.).
  // Default bucket is houseNumber — numeric fallback if no marker.
  // ----------------------------------------------------------------
  let activeBucket = "houseNumber";

  for (const word of words) {

    // House marker — encoded as "MARKER_HOUSE:ORIGINALWORD"
    if (word.startsWith("MARKER_HOUSE:")) {
      const originalMarkerWord = word.split(":")[1];
      activeBucket = "houseNumber";
      result.houseNumber = result.houseNumber
        ? result.houseNumber + " " + originalMarkerWord
        : originalMarkerWord;
      continue;
    }

    // Jalan marker — encoded as "MARKER_JLN:ORIGINALWORD"
    if (word.startsWith("MARKER_JLN:")) {
      const originalMarkerWord = word.split(":")[1];
      activeBucket = "jalan";
      result.jalan = result.jalan
        ? result.jalan + " " + originalMarkerWord
        : originalMarkerWord;
      continue;
    }

    // Kampong marker — encoded as "MARKER_KG:ORIGINALWORD"
    if (word.startsWith("MARKER_KG:")) {
      const originalMarkerWord = word.split(":")[1];
      activeBucket = "kampong";
      result.kampong = result.kampong
        ? result.kampong + " " + originalMarkerWord
        : originalMarkerWord;
      continue;
    }

    // Simpang marker — encoded as "MARKER_SPG:ORIGINALWORD"
    if (word.startsWith("MARKER_SPG:")) {
      const originalMarkerWord = word.split(":")[1];
      activeBucket = "simpang";
      result.simpang = result.simpang
        ? result.simpang + " " + originalMarkerWord
        : originalMarkerWord;
      continue;
    }

    switch (word) {
      default:
        // Restore whitelist token if applicable
        const restored = whitelistRestore[word] || word;
        result[activeBucket] = result[activeBucket]
          ? result[activeBucket] + " " + restored
          : restored;
    }
  }

  log.push("Phase 5 — State machine complete.");

  // ----------------------------------------------------------------
  // Phase 6: Postcode Enrichment
  // Cross-reference the extracted postcode against POSTCODE_MAP.
  // Fill-only rule: only populate fields that are still empty.
  // User-provided values are never overwritten.
  // ----------------------------------------------------------------
  if (result.postcode) {
    const mapEntry = POSTCODE_MAP.find(e => e.POSTCODE === result.postcode);
    if (mapEntry) {
      log.push("Phase 6 — Postcode map entry found for: " + result.postcode);

      if (!result.district && mapEntry.DISTRICT) {
        result.district = mapEntry.DISTRICT;
        enrichedFields.add("district");
        log.push("Phase 6 — District filled from map: " + result.district);
      } else if (result.district) {
        log.push("Phase 6 — District kept from input (map has: " + mapEntry.DISTRICT + ")");
      }

      if (!result.mukim && mapEntry.MUKIM) {
        result.mukim = mapEntry.MUKIM;
        enrichedFields.add("mukim");
        log.push("Phase 6 — Mukim filled from map: " + result.mukim);
      } else if (result.mukim) {
        log.push("Phase 6 — Mukim kept from input (map has: " + mapEntry.MUKIM + ")");
      }

      if (!result.kampong && mapEntry.KAMPONG) {
        result.kampong = mapEntry.KAMPONG;
        enrichedFields.add("kampong");
        log.push("Phase 6 — Kampong filled from map: " + result.kampong);
      } else if (result.kampong) {
        log.push("Phase 6 — Kampong kept from input (map has: " + mapEntry.KAMPONG + ")");
      }

      if (!result.country && mapEntry.COUNTRY) {
        result.country = mapEntry.COUNTRY;
        enrichedFields.add("country");
        log.push("Phase 6 — Country filled from map: " + result.country);
      } else if (result.country) {
        log.push("Phase 6 — Country kept from input (map has: " + mapEntry.COUNTRY + ")");
      }

    } else {
      log.push("Phase 6 — WARNING: Postcode [" + result.postcode + "] not found in postcode map. No enrichment applied.");
    }
  } else {
    log.push("Phase 6 — No postcode extracted. Enrichment skipped.");
  }

  // ----------------------------------------------------------------
  // Final log summary
  // ----------------------------------------------------------------
  log.push("--- Final Result ---");
  for (const [k, v] of Object.entries(result)) {
    const tag = enrichedFields.has(k) ? " [from map]" : "";
    log.push(k + ": " + (v || "(empty)") + tag);
  }

  return { result, log, enrichedFields };
}

// ============================================================
// UI
// ============================================================

function runParser() {
  const raw = document.getElementById("inputAddress").value.trim();
  if (!raw) return;

  const { result, log, enrichedFields } = parseAddress(raw);

  const fieldMap = [
    { id: "r_house",    key: "houseNumber" },
    { id: "r_spg",      key: "simpang"     },
    { id: "r_jln",      key: "jalan"       },
    { id: "r_kg",       key: "kampong"     },
    { id: "r_mukim",    key: "mukim"       },
    { id: "r_postcode", key: "postcode"    },
    { id: "r_district", key: "district"    },
    { id: "r_country",  key: "country"     },
  ];

  for (const { id, key } of fieldMap) {
    const cell = document.getElementById(id);
    const val  = result[key];
    if (val) {
      cell.textContent = val;
      // Italicise values that were filled from the postcode map
      cell.className = enrichedFields.has(key) ? "enriched" : "";
    } else {
      cell.textContent = "—";
      cell.className = "empty";
    }
  }

  document.getElementById("debugLog").textContent = log.join("\n");
  document.getElementById("output").style.display = "block";

  // Reset debug panel to closed on each new parse
  document.getElementById("debugLog").style.display = "none";
  document.getElementById("debugToggle").textContent = "▶ Show debug log";
}

function clearAll() {
  document.getElementById("inputAddress").value = "";
  document.getElementById("output").style.display = "none";
}

function toggleDebug() {
  const log = document.getElementById("debugLog");
  const btn = document.getElementById("debugToggle");
  if (log.style.display === "none") {
    log.style.display = "block";
    btn.textContent = "▼ Hide debug log";
  } else {
    log.style.display = "none";
    btn.textContent = "▶ Show debug log";
  }
}
